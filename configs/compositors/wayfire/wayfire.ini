[core]
xwayland = true
dpi = 0
ipc = true

[output]
mode = auto
transform = 0

[input]
xkb_layout = us
xkb_options = grp:alt_shift_toggle,compose:ralt

[touch]
tap = true
natural_scroll = true
tap_button_map = lrm
click_method = clickfinger
dwt = true

[decoration]
active = 81a1c1FF
inactive = 2e3440FF
inactive_shadow = 2e3440FF
border_size = 2
corner_radius = 10

[blur]
method = gaussian
size = 6
passes = 3

[shadow]
enabled = true
size = 20
blur = true
color = 1a1a1a99

[alpha]
default = 1.0

[animations]
duration = 300
enabled = true
easing = ease-in-out

[workspaces]
names = One,Two,Three,Four
wrap = true

[switcher]
modifier = SUPER
preview = true

[expo]
modifier = SUPER + E
duration = 300

[fade]
duration = 200
in = true
out = true

[vswitch]
duration = 300
