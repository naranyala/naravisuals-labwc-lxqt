# Hyprland Configuration for LXQt
# Place at: ~/.config/hypr/hyprland.conf

# ---- Monitor ----
monitor = , preferred, auto, 1

# ---- Autostart LXQt ----
exec-once = lxqt-session
exec-once = lxqt-panel
exec-once = lxqt-globalkeysd
exec-once = lxqt-notificationd
exec-once = lxqt-powermanagement
exec-once = lxqt-policykit-agent

# ---- Autostart Services ----
exec-once = sh -c 'W=$(cat ~/.config/labwc/wallpaper 2>/dev/null); [ -f "$W" ] && exec swaybg -i "$W" -m fill || exec swaybg -i /usr/share/backgrounds/warty-final-ubuntu.png -m fill'
exec-once = dunst
exec-once = nm-applet
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ---- Environment Variables ----
env = XDG_CURRENT_DESKTOP, LXQt:Hyprland
env = XDG_SESSION_DESKTOP, lxqt-hyprland
env = XDG_SESSION_TYPE, wayland
env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = MOZ_ENABLE_WAYLAND, 1
env = GDK_BACKEND, wayland,x11
env = ELECTRON_ENABLE_WAYLAND, 1
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# ---- Input ----
input {
    kb_layout = us
    kb_options = grp:alt_shift_toggle,compose:ralt

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = no
        tap-to-click = true
        disable_while_typing = true
        scroll_method = two_finger
        clickfinger_behavior = true
    }
}

# ---- General ----
general {
    gaps_in = 8
    gaps_out = 8
    border_size = 2

    col.active_border = rgba(81a1c1ff)
    col.inactive_border = rgba(2e3440ff)

    layout = master
    allow_tearing = false
}

# ---- Decoration ----
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1a1a99)
    }
}

# ---- Animations ----
animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 4, ease
    animation = windowsOut, 1, 4, ease, popin 80%
    animation = fade, 1, 3, ease
    animation = workspaces, 1, 4, ease, slide
}

# ---- Layouts ----
master {
    new_status = slave
    mfact = 0.55
}

dwindle {
    pseudotile = true
    preserve_split = true
}

# ---- Keybindings ----
$mainMod = SUPER

bind = $mainMod, Return, exec, qterminal
bind = $mainMod SHIFT, Return, exec, qterminal --drop-down
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, E, exec, pcmanfm-qt
bind = $mainMod, Q, killactive
bind = $mainMod, M, togglefloating
bind = $mainMod, F, fullscreen
bind = $mainMod, V, exec, pavucontrol
bind = $mainMod, L, exec, lxqt-leave
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

# Screenshots
bind = , Print, exec, grimshot copy screen
bind = SHIFT, Print, exec, grimshot copy area
bind = CTRL, Print, exec, grimshot save screen ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).png

# Volume
binde = XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Media
bind = XF86AudioPlay, exec, playerctl play-pause
bind = XF86AudioNext, exec, playerctl next
bind = XF86AudioPrev, exec, playerctl previous

# Brightness
binde = XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Lock
bind = $mainMod, F12, exec, swaylock -f -c 1e1e1e

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ---- Window Rules ----
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save As)$
windowrulev2 = float, title:^(Confirm)$

windowrulev2 = opacity 0.95, class:^(qterminal)$
windowrulev2 = opacity 0.95, class:^(pcmanfm-qt)$
