[General]
TerminalEmu=xterm
TerminalEmuArgs=-e
TerminalEmuBlinkCursor=false
TerminalEmuFont=Noto Sans Mono
TerminalEmuFontSize=10
TerminalTransparency=true
TerminalTransparencyLevel=85
TerminalUseCustomColor=false
TerminalCustomColor=#000000
TerminalCustomTextColor=#ffffff
TerminalColorScheme=Nord
TerminalHideMenu=true
TerminalHideTabBar=false
TerminalHideScrollbar=true
TerminalMargin=4
TerminalDropMode=false
TerminalDropHeight=50
TerminalDropWidth=100
TerminalDropPosition=top
TerminalDropShortcut=F12
TerminalAskOnExit=false

[Shortcuts]
Copy=Ctrl+Shift+C
Paste=Ctrl+Shift+V
NewTab=Ctrl+Shift+T
CloseTab=Ctrl+Shift+W
NextTab=Ctrl+PageDown
PrevTab=Ctrl+PageUp
ZoomIn=Ctrl++
ZoomOut=Ctrl+-
ZoomReset=Ctrl+0
Find=Ctrl+Shift+F
