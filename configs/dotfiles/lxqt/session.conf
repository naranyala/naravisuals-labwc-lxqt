[General]
__userfile__=~/.config/lxqt/session.conf
version=2.1.0

[Environment]
DESKTOPFILE=lxqt-miriway.desktop
QT_QPA_PLATFORMTHEME=qt6ct
GTK_THEME=Adwaita-dark
GTK_MODULES=:appmenu-gtk-module

[Input]
keyboard_layouts=us
keyboard_options=grp:alt_shift_toggle,compose:ralt
keyboard_use_custom_layout=true

[Cursor]
cursor_theme=Bibata-Modern-Ice
cursor_size=24

[Session]
window_manager=
compositor=labwc
autostart_delay=0
lock_screen=true
language=

[LXQt]
theme=Frost
icon_theme=Papirus-Dark
font=Noto Sans,10,-1,5,50,0,0,0,0,0
fixed_font=Noto Sans Mono,10,-1,5,50,0,0,0,0,0
single_click_activate=false
show_thumbnail=true
thumbnail_size=256
