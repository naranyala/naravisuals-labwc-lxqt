[General]
__userfile__=~/.config/lxqt/panel.conf
preferred_backend=wlroots
panel_size=48
icon_size=32

panels=panel1

[panel1]
position=Bottom
desktop=0
plugins=fancymenu,desktopswitch,quicklaunch,taskbar,spacer,statusnotifier,tray,volume,worldclock,showdesktop
width=100
height=48
alignment=Center
marginLeft=0
marginRight=0
marginBottom=0
font=Noto Sans,10,-1,5,50,0,0,0,0,0
backgroundImage=
opacity=90
background-color=rgba(30,30,30,230)
animations=true
hidable=false

[fancymenu]
type=fancymenu
alignment=Left
filterClear=true
autoSel=true
autoSelDelay=150
showText=true
text=Applications
icon=start-here

[desktopswitch]
type=desktopswitch
alignment=Left
showLabels=true
showIcons=false
showCurrent=true
rows=1

[quicklaunch]
type=quicklaunch
alignment=Left
apps=firefox,thunderbird,emacs,pcmanfm-qt,qterminal
iconSize=32

[taskbar]
type=taskbar
alignment=Left
buttonWidth=250
closeOnMiddleClick=true
groupingEnabled=false
showOnlyCurrentDesktopTasks=true
showDesktopName=false
showWindowTitle=true
showTooltips=true
maxButtonWidth=250

[spacer]
type=spacer
alignment=Center
width=0
expand=true

[statusnotifier]
type=statusnotifier
alignment=Right
showMenu=true
showAll=false

[tray]
type=tray
alignment=Right
iconSize=24

[volume]
type=volume
alignment=Right
device=0
showLabel=false
mixer=pavucontrol
volumeStep=5

[worldclock]
type=worldclock
alignment=Right
format=ddd MMM d HH:mm
timezone=UTC
showDate=true
showTime=true
tooltipFormat=LLLL

[showdesktop]
type=showdesktop
alignment=Right

[panel2]
position=Left
desktop=0
plugins=fancymenu,quicklaunch,desktopswitch,taskbar
width=48
height=100
alignment=Center
marginLeft=0
marginRight=0
marginBottom=0
font=Noto Sans,9,-1,5,50,0,0,0,0,0
background-color=rgba(30,30,30,230)
opacity=90
animations=false
hidable=true
