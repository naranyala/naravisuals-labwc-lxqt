[redshift]
; Night light for eye protection
; Day: 6500K (neutral), Night: 3500K (warm)
temp-day=6500
temp-night=3500

; Transition speed (seconds)
transition=5

; Location provider: geoclue2 (auto-detect) or manual
location-provider=geoclue2

; Screen adjustment method (randr for Wayland/wlr)
screen-provider=gamma-randr

; Adjustment brightness (1.0 = no change)
brightness-day=1.0
brightness-night=0.85

; Gamma adjustment (RGB, 1.0 = no change)
gamma-day=1.0
gamma-night=0.8

[manual]
; Fallback if geoclue2 unavailable
lat=0
lon=0

[geoclue2]
; Use system geolocation
; Falls back to manual lat/lon if geoclue not installed

[randr]
; Use wlr-randr or gamma-randr for wlroots compositors
; Works with labwc, sway, hyprland, etc.
